project:
  name: west-tripura-chabtot
  mode: rag_ingestion
  data_root: output
  pages_dir: output/pages
  processed_documents_dir: processed_documents
  processed_chunks_dir: processed_chunks
  logs_dir: logs

model:
  name: BAAI/bge-m3
  local_snapshot: models/models--BAAI--bge-m3/snapshots
  vector_size: 1024
  device: cpu

document:
  chunk_token_size: 300
  chunk_token_overlap: 30
  max_chunk_token_size: 450
  min_chunk_words: 15

qdrant:
  host: localhost
  port: 6333
  collection: west_tripura_pages
  distance: Cosine
  sparse_enabled: true
  batch_size: 64
  embed_batch_size: 8
