version: "3.9"

# Override for local development: hot-reload, no workers, debug mode
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/backend
      --log-level debug
    environment:
      DEBUG: "true"
      WORKERS: "1"
    volumes:
      - .:/app
      - uploads_data:/app/uploads
